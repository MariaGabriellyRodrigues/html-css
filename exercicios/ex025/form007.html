<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formuláro</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <p>
                <label for="iest">Estado</label>
                <select name="estado" id="iest">
                    <option value="">---Escolha---</option>
                    <option value="AC">Acre</option>
                    <option value="AL">Alagoas</option>
                    <option value="AP">Amapá</option>
                    <option value="AM">Amazonas</option>
                    <option value="BA">Bahia</option>
                    <option value="CE">Ceará</option>
                    <option value="ES">Espírito Santo</option>
                    <option value="GO">Goiás</option>
                    <option value="MA">Maranhão</option>
                    <option value="MT">Mato Grosso</option>
                    <option value="MS">Mato Grosso do Sul</option>
                    <option value="MG">Minas Gerais</option>
                    <option value="PA">Pará</option>
                    <option value="PB">Paraíba</option>
                    <option value="PR">Paraná</option>
                    <option value="PE">Pernambuco</option>
                    <option value="PI">Piauí</option>
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="RN">Rio Grande do Norte</option>
                    <option value="RS">Rio Grande do Sul</option>
                    <option value="RO">Rondônia</option>
                    <option value="RR">Roraima</option>
                    <option value="SC">Santa Catarina</option>
                    <option value="SP">São Paulo</option>
                    <option value="SE">Sergipe</option>
                    <option value="TO">Tocantins</option>
                </select>
        </p>

        <p>
            <label for="iprf">Profissão</label>
            <input type="text" name="prof" id="iprof" list="lstprof">
            <datalist id="lstprof">
                <option value="Administrador">
                <option value="Analista de Sistemas">
                <option value="Arquiteto">
                <option value="Assistente Social">
                <option value="Atendente">
                <option value="Bancário">
                <option value="Bibliotecário">
                <option value="Cabeleireiro">
                <option value="Contador">
                <option value="Dentista">
                <option value="Desenvolvedor de Software">
                <option value="Designer Gráfico">
                <option value="Engenheiro Civil">
                <option value="Enfermeiro">
                <option value="Farmacêutico">
                <option value="Fotógrafo">
                <option value="Jornalista">
                <option value="Médico">
                <option value="Motorista">
                <option value="Professor">
                <option value="Programador">
                <option value="Psicólogo">
                <option value="Recepcionista">
                <option value="Secretário(a)">
            </datalist>
        </p>

        <p>
            <label for="imgs">Mensagem</label><br>
            <textarea name="msg" id="imgs" cols="30" rows="10"></textarea>
        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
