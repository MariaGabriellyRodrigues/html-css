<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table{
            width: 500px;
            border-collapse: collapse;
            text-align: center;
        }

        caption{
            font-size: 1.3em;
            font-weight: bold;
            padding: 8px;
        
        }

        th, td{
            border: 1px solid black;
            padding:8px ;
        }

        col.nome{
            background-color: lightblue;
        }

        col.sexo{
            background-color: lightgreen;
        }

        .azul{
            background-color: lightblue;
        }
        .verde{
            background-color: lightgreen;
        }

    </style>
</head>
<body>
    <h1>Exercício de Tabelas</h1>
    <table>
      <colgroup>
        <col class="azul">
        <col class="verde">
        <col class="azul" span="2">
        
      </colgroup>
        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Ana Maria</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>Carlos Silva</td>
            <td>M</td>
            <td>32</td>
            <td>Professor</td>
        </tr>
        <tr >
            <td >Mariana Costa</td>
            <td>F</td>
            <td>28</td>
            <td>Engenheira</td>
        </tr>
            <tr>
                <td>João Pereira</td>
                <td>M</td>
                <td>40</td>
                <td>Médico</td>
            </tr>
            <tr>
                <td>Fernanda Lima</td>
                <td>F</td>
                <td>22</td>
                <td>Designer</td>
            </tr>
            <tr >
                <td>Ricardo Alves</td>
                <td>M</td>
                <td>35</td>
                <td>Advogado</td>
            </tr>
    </table>
</body>
</html>
