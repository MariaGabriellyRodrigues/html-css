<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproduzindo Áudio</title>
</head>
<body>
    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a reproduzir áudio em HTML5.</p>
    <audio controls>
        <source src="lofi.mp3" type="audio/mpeg">
        <source src="lofi.ogg" type="audio/ogg">
        <source src="lofi.wav" type="audio/wav">
        <p>infelismente seu navegador não consegue reproduzir áudio. <a href="lofi.mp3">clique aqui para baixar o arquivo MP3</a></p>
    </audio>
        
</body>
</html>
